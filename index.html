<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿哈配速終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00e5;
            --neon-yellow: #f3ff00;
        }
        
        body {
            background: radial-gradient(circle at center, #1a1b26 0%, #0f1016 100%);
            font-family: 'Noto Sans TC', sans-serif;
        }

        /* 玻璃擬態卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* 霓虹邊框樣式 */
        .neon-border-a { border-left: 4px solid var(--neon-yellow); box-shadow: -5px 0 15px rgba(243, 255, 0, 0.1); }
        .neon-border-b { border-left: 4px solid var(--neon-blue); box-shadow: -5px 0 15px rgba(0, 242, 255, 0.1); }
        .neon-border-c { border-left: 4px solid var(--neon-pink); box-shadow: -5px 0 15px rgba(255, 0, 229, 0.1); }

        /* 滑桿設計 */
        input[type=range] { -webkit-appearance: none; background: rgba(255, 255, 255, 0.1); height: 4px; border-radius: 2px; width: 100%; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; background: #fff; border-radius: 2px;
            cursor: pointer; box-shadow: 0 0 10px #fff; transform: rotate(45deg);
        }

        /* 隱藏輸入框箭頭 */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .locked-state { background: rgba(99, 102, 241, 0.1); opacity: 0.8; border-color: rgba(99, 102, 241, 0.5) !important; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black italic tracking-tighter text-white">
                阿哈配速 <span class="text-indigo-500">TERMINAL</span>
            </h1>
            <div class="h-1 w-32 bg-indigo-500 mx-auto mt-2 rounded-full shadow-[0_0_15px_#6366f1]"></div>
        </div>

        <div class="space-y-4">
            
            <div id="row-a" class="glass-card neon-border-a p-5 rounded-r-xl transition-all duration-300">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-4">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="fix-a" class="sr-only peer" onchange="updateUI()">
                            <div class="w-10 h-5 bg-gray-700 rounded-full peer peer-checked:bg-yellow-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                            <span class="ml-2 text-xs font-bold text-slate-400">鎖定</span>
                        </label>
                        <select id="role-a" class="bg-transparent text-yellow-400 font-bold text-lg focus:outline-none">
                            <option value="爻光">爻光 (a)</option>
                            <option value="銀狼">銀狼 (a)</option>
                            <option value="火花">火花 (a)</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="number" id="num-a" value="160" min="100" max="300" 
                               class="w-20 bg-white/5 border-b-2 border-yellow-500/50 text-right text-2xl font-bold text-yellow-400 focus:outline-none focus:border-yellow-400 transition"
                               oninput="syncSlider('a')">
                    </div>
                </div>
                <input type="range" id="slider-a" min="100" max="300" step="1" value="160" oninput="syncNum('a')">
                <div class="text-[10px] text-slate-500 mt-2 flex justify-between tracking-widest">
                    <span>順序：01 / 最快角色</span>
                    <span id="range-a">範圍：100-300</span>
                </div>
            </div>

            <div id="row-b" class="glass-card neon-border-b p-5 rounded-r-xl transition-all duration-300">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-4">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="fix-b" class="sr-only peer" onchange="updateUI()">
                            <div class="w-10 h-5 bg-gray-700 rounded-full peer peer-checked:bg-cyan-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                            <span class="ml-2 text-xs font-bold text-slate-400">鎖定</span>
                        </label>
                        <select id="role-b" class="bg-transparent text-cyan-400 font-bold text-lg focus:outline-none">
                            <option value="銀狼">銀狼 (b)</option>
                            <option value="爻光">爻光 (b)</option>
                            <option value="火花">火花 (b)</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="number" id="num-b" value="150" min="100" max="300" 
                               class="w-20 bg-white/5 border-b-2 border-cyan-500/50 text-right text-2xl font-bold text-cyan-400 focus:outline-none focus:border-cyan-400 transition"
                               oninput="syncSlider('b')">
                    </div>
                </div>
                <input type="range" id="slider-b" min="100" max="300" step="1" value="150" oninput="syncNum('b')">
                <div class="text-[10px] text-slate-500 mt-2 flex justify-between tracking-widest">
                    <span>順序：02 / 次快角色</span>
                    <span id="range-b">範圍：100-300</span>
                </div>
            </div>

            <div id="row-c" class="glass-card neon-border-c p-5 rounded-r-xl transition-all duration-300">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-4">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="fix-c" class="sr-only peer" onchange="updateUI()">
                            <div class="w-10 h-5 bg-gray-700 rounded-full peer peer-checked:bg-pink-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                            <span class="ml-2 text-xs font-bold text-slate-400">鎖定</span>
                        </label>
                        <select id="role-c" class="bg-transparent text-pink-400 font-bold text-lg focus:outline-none">
                            <option value="火花">火花 (c)</option>
                            <option value="爻光">爻光 (c)</option>
                            <option value="銀狼">銀狼 (c)</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="number" id="num-c" value="140" min="100" max="300" 
                               class="w-20 bg-white/5 border-b-2 border-pink-500/50 text-right text-2xl font-bold text-pink-400 focus:outline-none focus:border-pink-400 transition"
                               oninput="syncSlider('c')">
                    </div>
                </div>
                <input type="range" id="slider-c" min="100" max="300" step="1" value="140" oninput="syncNum('c')">
                <div class="text-[10px] text-slate-500 mt-2 flex justify-between tracking-widest">
                    <span>順序：03 / 第三快角色</span>
                    <span id="range-c">範圍：100-300</span>
                </div>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-3 gap-4">
            <div class="col-span-2 glass-card rounded-xl p-6 flex flex-col justify-center items-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent"></div>
                <span class="text-[10px] tracking-[0.3em] text-slate-400 mb-2">計算結果：阿哈速度 (d)</span>
                <div id="display-d" class="text-5xl font-black text-white drop-shadow-[0_0_10px_rgba(99,102,241,0.8)]">--</div>
            </div>
            <div class="glass-card rounded-xl p-4 flex flex-col justify-center border-indigo-500/30">
                <span class="text-[9px] text-indigo-400 mb-1">計算狀態</span>
                <div id="status-tag" class="text-xs font-bold text-emerald-400 tracking-widest">數值最佳</div>
            </div>
        </div>

        <div class="mt-6 p-5 glass-card rounded-xl border-dashed border-slate-600">
            <h4 class="text-xs text-yellow-500 mb-2 tracking-widest font-bold">戰略建議</h4>
            <p class="text-sm text-slate-300 leading-relaxed">
                等到 <span class="text-pink-500 font-bold">火花</span> 行動時，開啟 <span class="text-yellow-400 font-bold">爻光</span> 大招連鎖 <span class="text-cyan-400 font-bold">銀狼</span> 大招。
            </p>
        </div>
    </div>

    <script>
        const ids = ['a', 'b', 'c'];

        function syncNum(key) {
            const val = document.getElementById(`slider-${key}`).value;
            document.getElementById(`num-${key}`).value = val;
            updateUI();
        }

        function syncSlider(key) {
            let val = parseInt(document.getElementById(`num-${key}`).value);
            if (isNaN(val)) return;
            val = Math.max(100, Math.min(300, val));
            document.getElementById(`slider-${key}`).value = val;
            updateUI();
        }

        function updateUI() {
            let checked = ids.filter(id => document.getElementById(`fix-${id}`).checked);
            
            // 限制最多鎖定兩個
            if (checked.length > 2) {
                event.target.checked = false;
                checked = ids.filter(id => document.getElementById(`fix-${id}`).checked);
            }

            const a = parseInt(document.getElementById('slider-a').value);
            const b = parseInt(document.getElementById('slider-b').value);
            const c = parseInt(document.getElementById('slider-c').value);

            // 計算 d = 80 + 0.2a + 0.1b + 0.05c
            const d = 80 + (a * 0.2) + (b * 0.1) + (c * 0.05);
            document.getElementById('display-d').innerText = d.toFixed(2);

            // 更新背景 UI
            ids.forEach(id => {
                const isFixed = document.getElementById(`fix-${id}`).checked;
                const row = document.getElementById(`row-${id}`);
                const slider = document.getElementById(`slider-${id}`);
                const numInput = document.getElementById(`num-${id}`);
                
                if (isFixed) {
                    row.classList.add('locked-state');
                    slider.disabled = true;
                    numInput.disabled = true;
                } else {
                    row.classList.remove('locked-state');
                    slider.disabled = false;
                    numInput.disabled = false;
                }
            });

            // 動態範圍計算
            if (checked.length === 2) {
                const target = ids.find(id => !document.getElementById(`fix-${id}`).checked);
                const slider = document.getElementById(`slider-${target}`);
                const numInput = document.getElementById(`num-${target}`);
                const rangeLabel = document.getElementById(`range-${target}`);
                
                let min = 100, max = 300;

                if (target === 'c') {
                    // a > b > c > d
                    // c < b 且 c > (80 + 0.2a + 0.1b) / 0.95
                    min = Math.ceil((80 + 0.2 * a + 0.1 * b) / 0.95);
                    max = b - 1;
                } else if (target === 'b') {
                    // a > b > c 且 c > d
                    min = c + 1;
                    max = Math.floor((0.95 * c - 80 - 0.2 * a) / 0.1);
                    max = Math.min(max, a - 1);
                } else if (target === 'a') {
                    // a > b 且 c > d
                    min = b + 1;
                    max = Math.floor((0.95 * c - 80 - 0.1 * b) / 0.2);
                }

                if (min <= max && max >= 100 && min <= 300) {
                    const finalMin = Math.max(100, min);
                    const finalMax = Math.min(300, max);
                    slider.min = finalMin;
                    slider.max = finalMax;
                    rangeLabel.innerText = `建議範圍：${finalMin}-${finalMax}`;
                    rangeLabel.classList.replace('text-slate-500', 'text-indigo-400');

                    if (parseInt(slider.value) < finalMin) { slider.value = finalMin; numInput.value = finalMin; }
                    if (parseInt(slider.value) > finalMax) { slider.value = finalMax; numInput.value = finalMax; }
                } else {
                    rangeLabel.innerText = "目前配置無解";
                    rangeLabel.classList.replace('text-slate-500', 'text-red-500');
                }
            } else {
                // 重置
                ids.forEach(id => {
                    if (!document.getElementById(`fix-${id}`).checked) {
                        const s = document.getElementById(`slider-${id}`);
                        s.min = 100; s.max = 300;
                        const r = document.getElementById(`range-${id}`);
                        r.innerText = "範圍：100-300";
                        r.classList.add('text-slate-500');
                        r.classList.remove('text-indigo-400', 'text-red-500');
                    }
                });
            }
        }

        updateUI();
    </script>
</body>
</html>
